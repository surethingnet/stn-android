name: Build and Deploy to Phone

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    env:
      JAVA_HOME: 'C:\Program Files\Microsoft\jdk-17.0.19.10-hotspot'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Stop Gradle Daemon
        shell: pwsh
        run: |
          # Stop any running Gradle daemons on the host to clear plugin version caches
          if (Test-Path android/gradlew.bat) {
            cd android
            ./gradlew.bat --stop
          }

      - name: Build Debug APK
        shell: pwsh
        run: |
          flutter build apk --debug

      - name: Deploy to Phone
        shell: pwsh
        run: |
          # Use adb -d to target the connected physical/wireless device and install the built APK
          adb -d install -r build/app/outputs/flutter-apk/app-debug.apk
