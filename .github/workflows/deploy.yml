name: Build and Deploy to Phone

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    env:
      JAVA_HOME: 'C:\Program Files\Microsoft\jdk-17.0.19.10-hotspot'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Stop Gradle Daemon
        shell: pwsh
        run: |
          if (Test-Path android/gradlew.bat) {
            cd android
            ./gradlew.bat --stop
          }

      - name: Build Debug APK
        shell: pwsh
        run: |
          flutter build apk --debug

      - name: Deploy to Phone
        shell: pwsh
        run: |
          # List all active devices and print them for diagnostics
          adb devices
          
          # Parse active devices (filtering out header and offline devices)
          $deviceLines = adb devices | Select-String -Pattern "\bdevice\b"
          if ($deviceLines.Count -eq 0) {
            Write-Error "No connected ADB devices/emulators found! Please ensure your phone is connected via USB or wireless debugging."
            exit 1
          }
          
          # Target the first active device found
          $deviceId = ($deviceLines[0].Line -split "`t")[0].Trim()
          Write-Host "Targeting active device: $deviceId"
          adb -s $deviceId install -r build/app/outputs/flutter-apk/app-debug.apk
